<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Revo Stats</title>
  <meta name="theme-color" content="#071633" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />

  <link rel="stylesheet" href="./css/01-main.css" />
  <link rel="stylesheet" href="./css/02-effects.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Revo Stats</h1>
        <p class="subtitle">CSV statement reader</p>
      </div>

      <div class="topbar-actions">
        <button id="importBtn" class="btn primary" type="button">
  Import CSV
</button>

<input id="fileInput" type="file" accept=".csv,text/csv" hidden />

        <button id="clearDbBtn" class="btn danger" type="button">
          Clear Data
        </button>

        <button id="selectImportBtn" class="btn" type="button">
          Select File
        </button>
      </div>
    </header>

    <main class="main">
      <section class="panel import-panel">
        <div class="panel-head">
          <h2>Import</h2>
        </div>

        <div class="import-meta">
          <div><strong>Imported files:</strong> <span id="importCount">0</span></div>
          <div><strong>Total transactions:</strong> <span id="txCount">0</span></div>
          <div><strong>Status:</strong> <span id="statusText">Ready</span></div>
          <div><strong>Selected file:</strong> <span id="selectedImportName">All imports</span></div>
        </div>
      </section>

      <section class="summary-grid">
        <article class="card stat-card">
          <div class="label">Income</div>
          <div class="value" id="incomeValue">€0.00</div>
        </article>

        <article class="card stat-card">
          <div class="label">Expenses</div>
          <div class="value" id="expenseValue">€0.00</div>
        </article>

        <article class="card stat-card">
          <div class="label">Net</div>
          <div class="value" id="netValue">€0.00</div>
        </article>

        <article class="card stat-card">
          <div class="label">Fees</div>
          <div class="value" id="feeValue">€0.00</div>
        </article>
      </section>

      <section class="panel filters-panel">
        <div class="panel-head">
          <h2>Filters</h2>
        </div>

        <div class="filters-row">
          <input
            id="searchInput"
            class="input"
            type="search"
            placeholder="Search description, type, currency..."
          />

          <button id="typeFilterBtn" class="input input-btn" type="button">
  <span>Type:</span>
  <strong id="typeFilterLabel">All types</strong>
</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Monthly Stats</h2>
        </div>

        <div id="monthlyStats" class="monthly-list empty-state">
          No data yet
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Transactions</h2>
          <span class="muted" id="visibleCount">0 shown</span>
        </div>

        <div id="transactionsList" class="tx-list empty-state">
          Import a CSV file to see transactions
        </div>
      </section>
    </main>
  </div>

  <div id="importModal" class="modal hidden">
    <div class="modal-backdrop" id="importModalBackdrop"></div>

    <div class="modal-sheet">
      <div class="modal-sheet-header">
        <h3>Select File</h3>
        <button id="closeImportModal" class="modal-close" type="button">✕</button>
      </div>

      <div class="modal-sheet-actions">
        <button id="showAllImportsBtn" class="btn" type="button">Show All</button>
      </div>

      <div id="modalImportList" class="modal-import-list"></div>
    </div>
  </div>
  
  <div id="typeModal" class="modal hidden">
  <div class="modal-backdrop" id="typeModalBackdrop"></div>

  <div class="modal-sheet">
    <div class="modal-sheet-header">
      <h3>Select Type</h3>
      <button id="closeTypeModal" class="modal-close" type="button">✕</button>
    </div>

    <div id="typeModalList" class="modal-type-list"></div>
  </div>
</div>

  <script type="module" src="./js/08-app.js"></script>
</body>
</html>
